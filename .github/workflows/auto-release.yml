name: Auto Release

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run auto release
        id: auto_release
        run: node scripts/auto-publish.js

      - name: Commit release changes
        if: steps.auto_release.outputs.released == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts status.json
          git diff --cached --quiet || git commit -m "chore: auto publish version"
          git push

      - name: Create GitHub release
        if: steps.auto_release.outputs.released == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.auto_release.outputs.tag_name }}
          VERSION_NAME: ${{ steps.auto_release.outputs.version_name }}
          VERSION_CODE: ${{ steps.auto_release.outputs.version_code }}
        run: |
          RELEASE_APK="AIEnglishSceneSpeak-${VERSION_NAME}.apk"
          cp app/build/outputs/apk/debug/*.apk "$RELEASE_APK"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          gh release create "$TAG_NAME" "$RELEASE_APK" --title "$TAG_NAME" --notes "Version $VERSION_NAME"
